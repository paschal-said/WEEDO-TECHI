<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEED TECH – Assistant v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;      
            --white: #ffffff;
            --dark-blue: #0A2540;     
            --accent-blue: #1A56CC;   
            --gray-chat: #E6EDF5;     
            --wa: #25D366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg-color); 
            color: var(--dark-blue);   
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .branding { text-align: center; margin-bottom: 20px; }
        .branding h1 { font-family: 'Syne'; font-size: 36px; margin: 0; color: var(--dark-blue); }
        .branding h1 span { color: var(--accent-blue); }

        #chatWindow { 
            width: 380px; 
            max-width: calc(100vw - 40px); 
            height: 550px; 
            background: var(--white); 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid rgba(10, 37, 64, 0.1); 
            box-shadow: 0 15px 40px rgba(10, 37, 64, 0.1);
        }

        .header { 
            background: var(--dark-blue); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        .avatar { 
            width: 35px; height: 35px; border-radius: 50%; 
            background: var(--white); color: var(--dark-blue); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-family: 'Syne'; 
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #fafbfc;
        }

        .bubble { 
            padding: 12px 16px; 
            border-radius: 16px; 
            font-size: 14px; 
            line-height: 1.5; 
            max-width: 85%; 
            word-wrap: break-word;
        }

        .user { 
            align-self: flex-end; 
            background: var(--dark-blue); 
            color: var(--white); 
            border-bottom-right-radius: 2px; 
        }

        .ai { 
            align-self: flex-start; 
            background: var(--gray-chat); 
            color: var(--dark-blue); 
            border-bottom-left-radius: 2px; 
        }

        .input-area { 
            padding: 15px; 
            background: var(--white); 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid rgba(10, 37, 64, 0.1);
        }

        #userInput { 
            flex: 1; 
            background: #f4f7fa; 
            border: 1px solid rgba(10, 37, 64, 0.2); 
            border-radius: 10px; 
            padding: 12px; 
            color: var(--dark-blue); 
            outline: none; 
            font-weight: 500;
        }

        #sendBtn { 
            background: var(--dark-blue); 
            border: none; 
            padding: 0 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            color: var(--white);
        }

        .wa-btn {
            display: inline-block;
            margin-top: 10px;
            background: var(--wa);
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="branding">
    <h1>WEED <span>TECH</span></h1>
    <p style="color: #667085; font-size: 14px;">Instant Assistant v2</p>
</div>

<div id="chatWindow">
    <div class="header">
        <div class="avatar">WT</div>
        <div>
            <h4 style="margin:0; font-size: 14px; color: var(--white);">WEED TECH AI</h4>
            <small style="color: #64B5F6">● Online</small>
        </div>
    </div>

    <div id="messages">
        <div class="bubble ai">Habari! Karibu WEED TECH. 👋 Mimi ni msaidizi wako wa hapa. Nisaidie jina lako tafadhali?</div>
    </div>

    <div class="input-area">
        <input id="userInput" type="text" placeholder="Andika hapa..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    let step = 1; 
    let userName = "";

    function addMessage(sender, text, showWhatsApp = false) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        div.innerHTML = text;
        
        if (showWhatsApp) {
            div.innerHTML += `<br><a href="https://wa.me/255650069243" target="_blank" class="wa-btn">Agiza via WhatsApp</a>`;
        }

        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function getRuleBasedResponse(input) {
        const text = input.toLowerCase().trim();

        // STEP 1: Kupokea Jina la Mtumiaji
        if (step === 1) {
            userName = input;
            step = 2; 
            return `Nashukuru **${userName}**! Hapa WEED TECH tunatoa huduma za kisasa za Tech na Design. <br><br>Andika **BEI** au **HUDUMA** ili uone orodha yetu kamili ya huduma 10!`;
        }

        // STEP 2: Orodha Kuu au Huduma Moja Moja
        if (text.includes("bei") || text.includes("huduma") || text.includes("orodha") || text.includes("pricing")) {
            return `Hii hapa orodha ya bei zetu **${userName}**:<br><br>` +
                   `• 🔸 **Logo Design:** 20,000 Tsh<br>` +
                   `• 🔸 **Poster Design:** 20,000 Tsh<br>` +
                   `• 🔸 **Business Card:** 30,000 Tsh<br>` +
                   `• 🔸 **Book Cover:** 20,000 Tsh<br>` +
                   `• 🔸 **Flyer Design:** 20,000 Tsh<br>` +
                   `• 🔸 **Calendar:** 20,000 Tsh<br>` +
                   `• 🔸 **Social Media Post:** 15,000 Tsh<br>` +
                   `• 🔸 **Digital Branding:** 50,000 Tsh<br>` +
                   `• 🔸 **Web Design:** 500,000+ Tsh<br>` +
                   `• 🔸 **Software Dev:** 1,000,000+ Tsh<br><br>` +
                   `Andika jina la huduma unayotaka (Mfano: **Logo** au **Web**) ili kuagiza!`;
        }

        // Kudhibiti huduma moja baada ya nyingine
        if (text.includes("poster")) {
            return `Sawa **${userName}**, huduma ya **Poster Design** ni Tsh 20,000 tu. Tunatengeneza bango safi kwa ajili ya biashara au tukio lako.`;
        }
        if (text.includes("logo") || text.includes("nembo")) {
            return `Safi sana **${userName}**, huduma ya **Logo Design** ni Tsh 20,000 tu. Nembo ya kisasa inayobeba utambulisho kamili wa biashara yako.`;
        }
        if (text.includes("card") || text.includes("business")) {
            return `Vizuri **${userName}**, huduma ya **Business Card** ni Tsh 30,000 tu. Kadi za kisasa zitakazowafanya wateja wako wakukumbuke.`;
        }
        if (text.includes("book") || text.includes("cover")) {
            return `Naam **${userName}**, huduma ya **Book Cover Design** ni Tsh 20,000 tu. Jalada lenye mvuto mkubwa kwa wasomaji wako.`;
        }
        if (text.includes("web") || text.includes("website")) {
            return `Kazi kubwa hiyo **${userName}**! Huduma ya **Web Design** inaanzia Tsh 500,000+. Tunatengeneza tovuti ya haraka, salama na ya kisasa sana.`;
        }
        if (text.includes("digital") || text.includes("branding")) {
            return `Sawa **${userName}**, huduma ya **Digital Branding** ni Tsh 50,000 tu. Kukupa muonekano mmoja wa kitaalamu kwenye mitandao yote.`;
        }
        if (text.includes("flyer")) {
            return `Safi **${userName}**, huduma ya **Flyer Design** ni Tsh 20,000 tu. Vipeperushi safi vyenye kuelezea bidhaa au huduma zako kwa ufupi.`;
        }
        if (text.includes("software") || text.includes("development") || text.includes("system")) {
            return `Hiyo ndio WEED TECH **${userName}**! Huduma ya **Software Development** inaanzia Tsh 1,000,000+. Tunatengeneza mifumo (Systems) na programu kulingana na mahitaji yako.`;
        }
        if (text.includes("social") || text.includes("media") || text.includes("post")) {
            return `Vizuri **${userName}**, huduma ya **Social Media Post** ni Tsh 15,000 tu kwa kila post moja. Muonekano safi wa kuvutia wateja Instagram, WhatsApp n.k.`;
        }
        if (text.includes("calendar") || text.includes("kalenda")) {
            return `Sawa **${userName}**, huduma ya **Calendar Design** ni Tsh 20,000 tu. Kalenda za kijanja kwa ajili ya ofisi au kampuni yako.`;
        }

        // Salamu za kawaida au shukrani
        if (text.includes("habari") || text.includes("mambo") || text.includes("hello")) {
            return `Habari ya muda huu **${userName}**! Andika **BEI** kuona orodha yetu ya huduma 10.`;
        }
        if (text.includes("asante") || text.includes("shukran")) {
            return `Karibu sana **${userName}**! WEED TECH tupo hapa kwa ajili yako kila wakati.`;
        }

        // Kama mteja ameandika kitu tofauti
        return `Samahani **${userName}**, sijaelewa vizuri. 😅<br>Tafadhali andika **BEI** ili uone orodha yote ya huduma zetu na bei zake.`;
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        
        if (!text) return;

        addMessage("user", text);
        input.value = "";

        setTimeout(() => {
            const replyText = getRuleBasedResponse(text);
            
            // Weka kitufe cha WhatsApp kama ujumbe si wa kwanza na si wa kuomba orodha kuu ya bei
            let showWA = false;
            const lowerText = text.toLowerCase();
            if (step > 2 && !lowerText.includes("bei") && !lowerText.includes("huduma") && !lowerText.includes("orodha") && !lowerText.includes("asante") && !lowerText.includes("habari")) {
                showWA = true; 
            }

            addMessage("ai", replyText, showWA);
        }, 300);
    }
</script>

</body>
</html>
